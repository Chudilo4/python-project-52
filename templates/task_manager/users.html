{% extends 'task_manager/base.html' %}
{% block content %}
<div class="container wrapper flex-grow-1">
    <h1 class="my-4">Пользователи</h1>
<table class="table table-striped">
  <thead>
    <tr>
      <th>ID</th>
      <th>Имя пользователя</th>
      <th>Полное имя</th>
      <th>Дата создания</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
  {%  for u in users %}
      <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.username }}</td>
        <td>{{ u.first_name }} {{ u.last_name }}</td>
        <td>{{ u.date_joined }}</td>
        <td>
          <a href="{% url 'users_update' u.pk %}">Изменить</a>
          <br>
          <a href="{% url 'users_delete' u.pk %}">Удалить</a>
        </td>
      </tr>
  {% endfor %}
  </tbody>
</table>
</div>
{% endblock %}
